[phases.install]
cmds = [
  "apt-get update -qq",
  "apt-get install -y curl python3 python3-pip ffmpeg",
  "pip3 install yt-dlp --break-system-packages 2>/dev/null || pip install yt-dlp 2>/dev/null || curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp && chmod +x /usr/local/bin/yt-dlp"
]

[start]
cmd = "node server.cjs"